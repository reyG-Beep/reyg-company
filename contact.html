<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

body{font-family:Arial;margin:0;}

<body>

<header>
<nav>

<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">
<h1>Contact REYG COMPANY</h1>

<p>Email: rehemaghati57@gmail.com</p>
<p>Phone: +255 653 134 864</p>
<p>Location: Dar es Salaam, Tanzania</p>

<<form id="contact-form" onsubmit="event.preventDefault();">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>
</form>

<p id="status"></p>

<script>
document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault(); // Secondary backup protection against page reload

    // Visual feedback so you know the button press actually triggered the JS
    document.getElementById("status").innerHTML = "Sending...";

    // 1. Gather form data
    let formData = new FormData(this);
    
    // 2. Convert FormData into a standard JavaScript object
    let object = {};
    formData.forEach((value, key) => {
        object[key] = value;
    });

    // 3. Convert the object into a JSON string
    let json = JSON.stringify(object);

    // 4. Send the request with proper JSON headers
    fetch("https://formsubmit.co/ajax/rehemaghati57@gmail.com", {
        method: "POST",
        headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: json
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("status").innerHTML = "Message sent successfully!";
        document.getElementById("contact-form").reset();
    })
    .catch(error => {
        console.error("Error:", error);
        document.getElementById("status").innerHTML = "Failed to send message.";
    });
});
</script>
</div>

</body>
</html>
